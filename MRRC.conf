# ============================================================
# V5.0 音频架构配置 - 独立进程模式
# ============================================================
[AUDIO_WORKER]
# 是否启用独立音频进程模式
# True: 使用独立进程处理音频（推荐，零阻塞）
# False: 使用传统的线程模式（V4.x兼容模式）
enabled = true

# TX 音频采样率 (Hz)
tx_sample_rate = 16000

# RX 音频采样率 (Hz)
rx_sample_rate = 16000

# 是否启用 Opus 编码
opus_enabled = true

# Opus 比特率 (bps) - 短波语音推荐 16000-24000
opus_bitrate = 20000

# Opus 编码复杂度 (1-10) - 越高音质越好但CPU占用越高
opus_complexity = 6

# 音频缓冲区大小 (ms) - 推荐值 50-200
buffer_ms = 100

# 进程间队列最大深度
queue_max_depth = 100

[PROCESS_MANAGER]
# 进程崩溃自动重启
auto_restart = true

# 重启延迟 (秒)
restart_delay = 2

# 最大重启次数（超过后不再重启）
max_restarts = 5

# 进程监控间隔 (秒)
monitor_interval = 1


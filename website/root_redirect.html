<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/mrrc/">
    <title>MRRC - Mobile Remote Radio Control</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
        }
        .redirect-container {
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #60a5fa;
        }
        p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(96, 165, 250, 0.3);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #60a5fa;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="logo">📻</div>
        <h1>MRRC Mobile Remote Radio Control</h1>
        <p>正在跳转到项目主页...</p>
        <div class="loading"></div>
        <p style="margin-top: 2rem; font-size: 0.9rem;">
            如果没有自动跳转，请 <a href="/mrrc/">点击这里</a>
        </p>
    </div>
    <script>
        // 立即跳转
        window.location.href = '/mrrc/';
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Voice Assistant">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>语音助手 - 智能识别与合成</title>
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" type="text/css" href="mobile_voice_assistant.css">
</head>
<body>
    <!-- 安全区域适配 -->
    <div class="safe-area-top"></div>
    
    <!-- 主容器 -->
    <div class="voice-assistant-container">
        <!-- 头部 -->
        <header class="va-header">
            <button id="back-btn" class="va-icon-btn" aria-label="返回">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="va-title">语音助手</h1>
            <button id="settings-btn" class="va-icon-btn" aria-label="设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.24 4.24l-4.24-4.24M6.34 6.34L2.1 2.1"/>
                </svg>
            </button>
        </header>

        <!-- 连接状态栏 -->
        <div class="va-status-bar">
            <div class="va-status-item" id="status-asr">
                <span class="status-dot"></span>
                <span class="status-text">识别</span>
            </div>
            <div class="va-status-item" id="status-tts">
                <span class="status-dot"></span>
                <span class="status-text">合成</span>
            </div>
            <div class="va-status-item" id="status-ptt">
                <span class="status-dot"></span>
                <span class="status-text">发射</span>
            </div>
            <div class="va-freq-display" id="current-freq">7053.0 kHz</div>
        </div>

        <!-- 语音识别显示区 -->
        <section class="va-recognition-section">
            <div class="va-section-header">
                <svg class="va-section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <span class="va-section-title">电台接收语音</span>
                <button id="clear-asr-btn" class="va-small-btn">清空</button>
            </div>
            
            <div class="va-recognition-display" id="asr-display">
                <div class="va-placeholder">等待接收语音...</div>
            </div>
            
            <div class="va-confidence-bar">
                <div class="va-confidence-label">置信度</div>
                <div class="va-confidence-track">
                    <div class="va-confidence-fill" id="confidence-fill" style="width: 0%"></div>
                </div>
                <div class="va-confidence-value" id="confidence-value">0%</div>
            </div>

            <!-- 实时波形显示 -->
            <canvas id="audio-visualizer" class="va-visualizer" width="350" height="60"></canvas>
        </section>

        <!-- 对话历史区 -->
        <section class="va-chat-section">
            <div class="va-section-header">
                <svg class="va-section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                </svg>
                <span class="va-section-title">对话记录</span>
                <button id="clear-chat-btn" class="va-small-btn">清空</button>
            </div>
            
            <div class="va-chat-history" id="chat-history">
                <!-- 对话消息将动态添加到这里 -->
            </div>
        </section>

        <!-- 回复输入区 -->
        <section class="va-reply-section">
            <div class="va-section-header">
                <svg class="va-section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
                <span class="va-section-title">回复内容</span>
                <div class="va-tts-controls">
                    <select id="tts-voice-select" class="va-select">
                        <option value="">默认语音</option>
                    </select>
                    <select id="tts-speed" class="va-select">
                        <option value="0.8">慢速</option>
                        <option value="1.0" selected>正常</option>
                        <option value="1.2">快速</option>
                    </select>
                </div>
            </div>
            
            <div class="va-input-area">
                <textarea 
                    id="reply-text" 
                    class="va-textarea" 
                    placeholder="输入要发送的回复文字..."
                    rows="3"
                ></textarea>
                
                <div class="va-input-actions">
                    <button id="quick-reply-btn" class="va-action-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                            <polyline points="2 17 12 22 22 17"/>
                            <polyline points="2 12 12 17 22 12"/>
                        </svg>
                        快捷回复
                    </button>
                    <button id="voice-input-btn" class="va-action-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        </svg>
                        语音输入
                    </button>
                </div>
            </div>
        </section>

        <!-- 快捷回复弹窗 -->
        <div id="quick-reply-modal" class="va-modal">
            <div class="va-modal-content">
                <div class="va-modal-header">
                    <h3>快捷回复</h3>
                    <button class="va-modal-close" id="close-quick-reply">&times;</button>
                </div>
                <div class="va-quick-replies" id="quick-replies-list">
                    <button class="va-quick-reply-item" data-text="这里是BH4XXX，信号报告59，您那边情况如何？">
                        📡 标准回复
                    </button>
                    <button class="va-quick-reply-item" data-text="信号很好，清晰可辨，继续">
                        👍 信号良好
                    </button>
                    <button class="va-quick-reply-item" data-text="信号较弱，请重复一遍">
                        🔁 请求重复
                    </button>
                    <button class="va-quick-reply-item" data-text="这里是BH4XXX，QRZ？">
                        ❓ 询问呼号
                    </button>
                    <button class="va-quick-reply-item" data-text="73，再见！">
                        👋 结束通联
                    </button>
                    <button class="va-quick-reply-item" data-text="请报一下您的位置">
                        📍 询问位置
                    </button>
                </div>
            </div>
        </div>

        <!-- 设置弹窗 -->
        <div id="settings-modal" class="va-modal">
            <div class="va-modal-content">
                <div class="va-modal-header">
                    <h3>设置</h3>
                    <button class="va-modal-close" id="close-settings">&times;</button>
                </div>
                <div class="va-settings-content">
                    <div class="va-setting-item">
                        <label class="va-setting-label">
                            <span>本地语音识别</span>
                            <span class="va-setting-desc">使用浏览器内置API</span>
                        </label>
                        <label class="va-toggle">
                            <input type="checkbox" id="setting-local-asr" checked>
                            <span class="va-toggle-slider"></span>
                        </label>
                    </div>
                    <div class="va-setting-item">
                        <label class="va-setting-label">
                            <span>本地语音合成</span>
                            <span class="va-setting-desc">使用浏览器内置TTS</span>
                        </label>
                        <label class="va-toggle">
                            <input type="checkbox" id="setting-local-tts" checked>
                            <span class="va-toggle-slider"></span>
                        </label>
                    </div>
                    <div class="va-setting-item">
                        <label class="va-setting-label">
                            <span>自动PTT发射</span>
                            <span class="va-setting-desc">合成完成后自动发射</span>
                        </label>
                        <label class="va-toggle">
                            <input type="checkbox" id="setting-auto-ptt">
                            <span class="va-toggle-slider"></span>
                        </label>
                    </div>
                    <div class="va-setting-item">
                        <label class="va-setting-label">
                            <span>语音识别语言</span>
                        </label>
                        <select id="setting-asr-lang" class="va-select">
                            <option value="zh-CN">中文</option>
                            <option value="en-US">English</option>
                            <option value="ja-JP">日本語</option>
                        </select>
                    </div>
                    <div class="va-setting-item">
                        <label class="va-setting-label">
                            <span>发射前延迟</span>
                            <span class="va-setting-desc">合成完成后等待时间</span>
                        </label>
                        <select id="setting-ptt-delay" class="va-select">
                            <option value="0">立即</option>
                            <option value="500">0.5秒</option>
                            <option value="1000" selected>1秒</option>
                            <option value="2000">2秒</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部操作栏 -->
        <div class="va-bottom-actions">
            <button id="play-tts-btn" class="va-play-btn" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <span>试听</span>
            </button>
            
            <button id="ptt-btn" class="va-ptt-btn">
                <div class="va-ptt-inner">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span class="va-ptt-text">按住发射</span>
                </div>
                <div class="va-ptt-waves">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </button>
            
            <button id="stop-tts-btn" class="va-stop-btn" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="6" width="12" height="12"/>
                </svg>
                <span>停止</span>
            </button>
        </div>

        <!-- 安全区域底部 -->
        <div class="safe-area-bottom"></div>
    </div>

    <!-- 加载提示 -->
    <div id="va-loading" class="va-loading hidden">
        <div class="va-loading-spinner"></div>
        <div class="va-loading-text">处理中...</div>
    </div>

    <!-- 提示消息 -->
    <div id="va-toast" class="va-toast"></div>

    <script src="mobile_voice_assistant.js"></script>
</body>
</html>

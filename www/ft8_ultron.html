<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <title>ULTRON FT8 - MRRC</title>
    <link rel="stylesheet" href="mobile_modern.css">
    <style>
        /* FT8 ULTRON 专用样式 */
        .ft8-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-primary);
        }
        
        /* 状态栏 */
        .ultron-status-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 8px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .status-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        
        .status-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .status-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-primary);
            font-family: var(--font-mono);
        }
        
        .status-value.active {
            color: var(--accent-success);
        }
        
        .status-value.warning {
            color: var(--accent-warning);
        }
        
        /* 控制面板 */
        .ultron-controls {
            display: flex;
            gap: 8px;
            padding: 8px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        
        .ultron-btn {
            flex: 1;
            min-width: 70px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .ultron-btn.primary {
            background: var(--accent-primary);
            color: var(--bg-primary);
        }
        
        .ultron-btn.success {
            background: var(--accent-success);
            color: var(--bg-primary);
        }
        
        .ultron-btn.danger {
            background: var(--accent-danger);
            color: white;
        }
        
        .ultron-btn.warning {
            background: var(--accent-warning);
            color: var(--bg-primary);
        }
        
        .ultron-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 解码列表 */
        .decodes-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            background: var(--bg-primary);
        }
        
        .decode-item {
            display: grid;
            grid-template-columns: 45px 35px 50px 30px 1fr;
            gap: 8px;
            padding: 8px;
            margin-bottom: 4px;
            background: var(--bg-card);
            border-radius: 8px;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            align-items: center;
        }
        
        .decode-item:hover {
            background: var(--bg-tertiary);
        }
        
        .decode-item.priority-high {
            border-left-color: var(--accent-success);
            background: rgba(16, 185, 129, 0.1);
        }
        
        .decode-item.priority-medium {
            border-left-color: var(--accent-warning);
        }
        
        .decode-item.worked {
            opacity: 0.5;
        }
        
        .decode-time {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
        
        .decode-snr {
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font-mono);
            color: var(--accent-primary);
        }
        
        .decode-snr.low {
            color: var(--accent-warning);
        }
        
        .decode-delta {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
        }
        
        .decode-status {
            font-size: 12px;
            font-weight: 700;
            text-align: center;
        }
        
        .decode-status.target {
            color: var(--accent-success);
        }
        
        .decode-status.worked {
            color: var(--accent-danger);
        }
        
        .decode-status.low {
            color: var(--accent-warning);
        }
        
        .decode-message {
            font-size: 13px;
            font-family: var(--font-mono);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .decode-dxcc {
            font-size: 10px;
            color: var(--text-muted);
        }
        
        /* 当前目标面板 */
        .target-panel {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-tertiary));
            padding: 12px;
            border-top: 1px solid var(--border-color);
        }
        
        .target-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .target-call {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-primary);
            font-family: var(--font-mono);
        }
        
        .target-dxcc {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .target-actions {
            display: flex;
            gap: 8px;
        }
        
        .target-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* 统计面板 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 8px;
            background: var(--bg-secondary);
        }
        
        .stat-item {
            text-align: center;
            padding: 8px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-primary);
            font-family: var(--font-mono);
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
        }
        
        /* 连接状态指示 */
        .connection-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
        }
        
        .connection-indicator.connected {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-success);
        }
        
        .connection-indicator.disconnected {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-danger);
        }
        
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .connection-indicator.connected .connection-dot {
            background: var(--accent-success);
        }
        
        .connection-indicator.disconnected .connection-dot {
            background: var(--accent-danger);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 设置面板 */
        .settings-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
        }
        
        .settings-panel.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .settings-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .setting-group {
            margin-bottom: 16px;
        }
        
        .setting-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .setting-input {
            width: 100%;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        /* 日志输出 */
        .log-panel {
            height: 100px;
            background: var(--bg-tertiary);
            padding: 8px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 11px;
            border-top: 1px solid var(--border-color);
        }
        
        .log-entry {
            margin-bottom: 2px;
            color: var(--text-secondary);
        }
        
        .log-entry.error {
            color: var(--accent-danger);
        }
        
        .log-entry.success {
            color: var(--accent-success);
        }
    </style>
</head>
<body>
    <div class="ft8-container">
        <!-- 头部 -->
        <header class="ft8-header">
            <div class="header-row">
                <button class="header-btn" onclick="window.location.href='mobile_modern.html'">
                    <span>←</span>
                </button>
                <div class="header-title">
                    <span class="title-main">ULTRON FT8</span>
                </div>
                <div class="connection-indicator disconnected" id="connection-status">
                    <span class="connection-dot"></span>
                    <span class="status-text">离线</span>
                </div>
            </div>
        </header>
        
        <!-- 状态栏 -->
        <div class="ultron-status-bar">
            <div class="status-card">
                <div class="status-label">软件</div>
                <div class="status-value" id="software-name">-</div>
            </div>
            <div class="status-card">
                <div class="status-label">频率</div>
                <div class="status-value" id="frequency">-</div>
            </div>
            <div class="status-card">
                <div class="status-label">模式</div>
                <div class="status-value" id="mode">-</div>
            </div>
            <div class="status-card">
                <div class="status-label">波段</div>
                <div class="status-value" id="band">-</div>
            </div>
            <div class="status-card">
                <div class="status-label">CQ状态</div>
                <div class="status-value" id="cq-status">停止</div>
            </div>
            <div class="status-card">
                <div class="status-label">目标</div>
                <div class="status-value" id="target-call">-</div>
            </div>
        </div>
        
        <!-- 控制按钮 -->
        <div class="ultron-controls">
            <button class="ultron-btn primary" id="btn-listen" onclick="toggleListen()">开始监听</button>
            <button class="ultron-btn success" id="btn-cq" onclick="sendCQ()" disabled>发送CQ</button>
            <button class="ultron-btn danger" id="btn-stop-cq" onclick="stopCQ()" disabled>停止CQ</button>
            <button class="ultron-btn warning" id="btn-settings" onclick="toggleSettings()">设置</button>
        </div>
        
        <!-- 解码列表 -->
        <div class="decodes-container" id="decodes-list">
            <div class="decode-empty" style="text-align: center; padding: 40px; color: var(--text-muted);">
                等待解码数据...<br>
                <small>请启动 JTDX/WSJT-X 并确保 UDP 端口 2237 开启</small>
            </div>
        </div>
        
        <!-- 当前目标面板 -->
        <div class="target-panel" id="target-panel" style="display: none;">
            <div class="target-info">
                <div>
                    <div class="target-call" id="current-target">-</div>
                    <div class="target-dxcc" id="target-dxcc">-</div>
                </div>
                <div class="target-actions">
                    <button class="target-btn" onclick="replyToTarget()">回复</button>
                    <button class="target-btn" onclick="skipTarget()">跳过</button>
                </div>
            </div>
        </div>
        
        <!-- 统计面板 -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="stat-today">0</div>
                <div class="stat-label">今日QSO</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-worked">0</div>
                <div class="stat-label">已通联</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-new">0</div>
                <div class="stat-label">新DXCC</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-decodes">0</div>
                <div class="stat-label">解码数</div>
            </div>
        </div>
        
        <!-- 日志面板 -->
        <div class="log-panel" id="log-panel">
            <div class="log-entry">系统就绪...</div>
        </div>
    </div>
    
    <!-- 设置面板 -->
    <div class="settings-panel" id="settings-panel">
        <div class="settings-content">
            <h3>ULTRON 设置</h3>
            
            <div class="setting-group">
                <label class="setting-label">我的呼号 (DE)</label>
                <input type="text" class="setting-input" id="setting-callsign" placeholder="YOURCALL">
            </div>
            
            <div class="setting-group">
                <label class="setting-label">网格定位</label>
                <input type="text" class="setting-input" id="setting-grid" placeholder="AA00aa">
            </div>
            
            <div class="setting-group">
                <label class="setting-label">信号阈值 (dB)</label>
                <input type="number" class="setting-input" id="setting-threshold" value="-20" min="-30" max="10">
            </div>
            
            <div class="setting-group">
                <label class="setting-label">自动回复</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="setting-auto-reply" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            
            <button class="ultron-btn primary" onclick="saveSettings()" style="width: 100%; margin-top: 16px;">保存设置</button>
            <button class="ultron-btn" onclick="toggleSettings()" style="width: 100%; margin-top: 8px;">取消</button>
        </div>
    </div>
    
    <script src="ft8_ultron.js"></script>
</body>
</html>

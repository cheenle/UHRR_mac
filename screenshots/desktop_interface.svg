<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a1a"/>
  
  <!-- Top Bar -->
  <rect x="0" y="0" width="800" height="40" fill="#222"/>
  <text x="20" y="28" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">MRRC - Mobile Remote Radio Control</text>
  <rect x="650" y="10" width="60" height="24" rx="4" fill="#4CAF50"/>
  <text x="660" y="27" fill="#fff" font-family="Arial" font-size="12">Power</text>
  <rect x="720" y="10" width="60" height="24" rx="4" fill="#333"/>
  <text x="735" y="27" fill="#fff" font-family="Arial" font-size="12">Menu</text>
  
  <!-- Left Panel - Controls -->
  <rect x="10" y="50" width="200" height="440" rx="8" fill="#222"/>
  <text x="20" y="75" fill="#888" font-family="Arial" font-size="12">FREQUENCY</text>
  <rect x="20" y="85" width="180" height="50" rx="5" fill="#111"/>
  <text x="30" y="120" fill="#4CAF50" font-family="Arial" font-size="28" font-weight="bold">7.053.000</text>
  <text x="170" y="120" fill="#888" font-family="Arial" font-size="14">MHz</text>
  
  <text x="20" y="160" fill="#888" font-family="Arial" font-size="12">MODE</text>
  <rect x="20" y="170" width="55" height="30" rx="5" fill="#1565c0"/>
  <text x="30" y="190" fill="#fff" font-family="Arial" font-size="11">USB</text>
  <rect x="80" y="170" width="55" height="30" rx="5" fill="#333"/>
  <text x="88" y="190" fill="#fff" font-family="Arial" font-size="11">LSB</text>
  <rect x="140" y="170" width="55" height="30" rx="5" fill="#333"/>
  <text x="152" y="190" fill="#fff" font-family="Arial" font-size="11">AM</text>
  
  <text x="20" y="225" fill="#888" font-family="Arial" font-size="12">FILTER</text>
  <rect x="20" y="235" width="180" height="25" rx="5" fill="#111"/>
  <text x="30" y="252" fill="#fff" font-family="Arial" font-size="11">MID 2.7kHz</text>
  
  <text x="20" y="285" fill="#888" font-family="Arial" font-size="12">VFO</text>
  <rect x="20" y="295" width="85" height="35" rx="5" fill="#1565c0"/>
  <text x="40" y="318" fill="#fff" font-family="Arial" font-size="14">VFO A</text>
  <rect x="115" y="295" width="85" height="35" rx="5" fill="#333"/>
  <text x="135" y="318" fill="#fff" font-family="Arial" font-size="14">VFO B</text>
  
  <text x="20" y="360" fill="#888" font-family="Arial" font-size="12">AF GAIN</text>
  <rect x="20" y="370" width="150" height="8" rx="4" fill="#333"/>
  <rect x="20" y="370" width="90" height="8" rx="4" fill="#4CAF50"/>
  <text x="175" y="378" fill="#fff" font-family="Arial" font-size="11">60%</text>
  
  <text x="20" y="410" fill="#888" font-family="Arial" font-size="12">SQUELCH</text>
  <rect x="20" y="420" width="150" height="8" rx="4" fill="#333"/>
  <rect x="20" y="420" width="30" height="8" rx="4" fill="#888"/>
  <text x="175" y="428" fill="#fff" font-family="Arial" font-size="11">20%</text>
  
  <!-- Center Panel - Spectrum & S-Meter -->
  <rect x="220" y="50" width="360" height="300" rx="8" fill="#222"/>
  <text x="230" y="75" fill="#888" font-family="Arial" font-size="12">SPECTRUM / PANADAPTER</text>
  
  <!-- Spectrum Display -->
  <rect x="230" y="85" width="340" height="150" rx="5" fill="#111"/>
  <polyline points="230,200 250,180 280,190 310,150 340,160 370,140 400,155 430,130 460,145 490,135 520,150 550,140 570,160" 
            fill="none" stroke="#4CAF50" stroke-width="2"/>
  <polyline points="230,200 250,195 280,198 310,185 340,190 370,175 400,180 430,165 460,175 490,170 520,178 550,172 570,180" 
            fill="none" stroke="#2196F3" stroke-width="1"/>
  
  <!-- Frequency markers -->
  <text x="235" y="230" fill="#666" font-family="Arial" font-size="9">7.050</text>
  <text x="335" y="230" fill="#666" font-family="Arial" font-size="9">7.052</text>
  <text x="435" y="230" fill="#666" font-family="Arial" font-size="9">7.054</text>
  <text x="535" y="230" fill="#666" font-family="Arial" font-size="9">7.056 MHz</text>
  
  <!-- S-Meter -->
  <text x="230" y="265" fill="#888" font-family="Arial" font-size="12">S-METER</text>
  <rect x="230" y="275" width="340" height="60" rx="5" fill="#111"/>
  <rect x="240" y="295" width="260" height="20" rx="3" fill="#333"/>
  <rect x="240" y="295" width="140" height="20" rx="3" fill="url(#grad2)"/>
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#F44336"/>
    </linearGradient>
  </defs>
  <text x="240" y="330" fill="#666" font-family="Arial" font-size="9">S1</text>
  <text x="280" y="330" fill="#666" font-family="Arial" font-size="9">S3</text>
  <text x="320" y="330" fill="#666" font-family="Arial" font-size="9">S5</text>
  <text x="360" y="330" fill="#666" font-family="Arial" font-size="9">S7</text>
  <text x="400" y="330" fill="#666" font-family="Arial" font-size="9">S9</text>
  <text x="450" y="330" fill="#666" font-family="Arial" font-size="9">+20</text>
  <text x="490" y="330" fill="#666" font-family="Arial" font-size="9">+40</text>
  <text x="530" y="310" fill="#4CAF50" font-family="Arial" font-size="16" font-weight="bold">S7 (-18dB)</text>
  
  <!-- Right Panel - Status & PTT -->
  <rect x="590" y="50" width="200" height="300" rx="8" fill="#222"/>
  <text x="600" y="75" fill="#888" font-family="Arial" font-size="12">STATUS</text>
  
  <rect x="600" y="90" width="85" height="60" rx="5" fill="#111"/>
  <text x="610" y="115" fill="#888" font-family="Arial" font-size="10">TX STATUS</text>
  <text x="610" y="140" fill="#4CAF50" font-family="Arial" font-size="14" font-weight="bold">RX</text>
  
  <rect x="695" y="90" width="85" height="60" rx="5" fill="#111"/>
  <text x="705" y="115" fill="#888" font-family="Arial" font-size="10">CONNECTION</text>
  <text x="705" y="140" fill="#4CAF50" font-family="Arial" font-size="12" font-weight="bold">● Online</text>
  
  <rect x="600" y="160" width="180" height="60" rx="5" fill="#111"/>
  <text x="610" y="185" fill="#888" font-family="Arial" font-size="10">AUDIO STATUS</text>
  <text x="610" y="205" fill="#4CAF50" font-family="Arial" font-size="11">● wsRX Connected</text>
  <text x="610" y="218" fill="#4CAF50" font-family="Arial" font-size="11">● wsTX Ready</text>
  
  <!-- PTT Button -->
  <rect x="610" y="240" width="160" height="70" rx="10" fill="#c62828"/>
  <text x="665" y="285" fill="#fff" font-family="Arial" font-size="22" font-weight="bold">PTT</text>
  
  <rect x="600" y="320" width="85" height="25" rx="5" fill="#333"/>
  <text x="610" y="337" fill="#fff" font-family="Arial" font-size="11">TUNE</text>
  <rect x="695" y="320" width="85" height="25" rx="5" fill="#333"/>
  <text x="705" y="337" fill="#fff" font-family="Arial" font-size="11">ATU</text>
  
  <!-- Bottom Info -->
  <rect x="10" y="460" width="780" height="30" rx="5" fill="#222"/>
  <text x="20" y="480" fill="#888" font-family="Arial" font-size="11">Latency: TX 65ms | RX 51ms | Switch: &lt;100ms</text>
  <text x="400" y="480" fill="#888" font-family="Arial" font-size="11">Sample Rate: 16kHz | Codec: Int16 PCM</text>
  <text x="700" y="480" fill="#4CAF50" font-family="Arial" font-size="11">● System Ready</text>
  
  <!-- Label -->
  <text x="400" y="400" fill="#666" font-family="Arial" font-size="16" text-anchor="middle">Desktop Interface</text>
  <text x="400" y="420" fill="#444" font-family="Arial" font-size="12" text-anchor="middle">Full-Featured Control Panel</text>
</svg>
